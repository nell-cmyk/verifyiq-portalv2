name: E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VERIFYIQ_BASE_URL: https://sandbox.verifyiq-mercury-dev.boost-frontend.app/
      VERIFYIQ_USERNAME: ${{ secrets.VERIFYIQ_USERNAME }}
      VERIFYIQ_PASSWORD: ${{ secrets.VERIFYIQ_PASSWORD }}
      VERIFYIQ_STORAGE_STATE_JSON: ${{ secrets.VERIFYIQ_STORAGE_STATE_JSON }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Static checks
        run: npm run check

      - name: Public smoke tests
        run: npm run test:e2e

      - name: Authenticated tests (storage state)
        if: ${{ env.VERIFYIQ_STORAGE_STATE_JSON != '' }}
        run: npm run test:e2e:auth

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14
