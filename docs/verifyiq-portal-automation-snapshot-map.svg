<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">VerifyIQ Portal Automation Snapshot Map</title>
  <desc id="desc">One-slide graphic explaining what the automation checks, how it works, current shipped state, and v2.0 expansion.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 58px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 25px Arial, Helvetica, sans-serif; fill: #475569; }
      .eyebrow { font: 800 20px Arial, Helvetica, sans-serif; letter-spacing: 1.5px; text-transform: uppercase; }
      .card-title { font: 800 35px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .body { font: 400 21px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 700 18px Arial, Helvetica, sans-serif; fill: #334155; }
      .micro { font: 400 17px Arial, Helvetica, sans-serif; fill: #475569; }
      .pill { font: 700 18px Arial, Helvetica, sans-serif; fill: #334155; }
      .mono { font: 700 18px "SFMono-Regular", Menlo, Consolas, monospace; fill: #334155; }
      .status { font: 800 20px Arial, Helvetica, sans-serif; }
      .shadow { filter: drop-shadow(0 18px 34px rgb(15 23 42 / 0.14)); }
    </style>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>
  <rect x="70" y="62" width="1780" height="956" rx="28" fill="#ffffff" stroke="#d9e2ec" stroke-width="3" class="shadow"/>

  <text class="title" x="118" y="145">VerifyIQ Portal Automation</text>
  <text class="subtitle" x="120" y="190">Reproducible Playwright checks for sandbox portal workflows, built to run safely without exposing credentials or mutating shared data.</text>

  <g transform="translate(1510 94)">
    <text class="small" x="0" y="0" text-anchor="end" fill="#0f172a">Status</text>
    <rect x="24" y="-27" width="155" height="42" rx="21" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text class="status" x="101" y="0" text-anchor="middle" fill="#166534">v1.1 shipped</text>
    <rect x="193" y="-27" width="150" height="42" rx="21" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
    <text class="status" x="268" y="0" text-anchor="middle" fill="#92400e">v2.0 planning</text>
  </g>

  <!-- What it does -->
  <g transform="translate(120 245)">
    <rect x="0" y="0" width="815" height="300" rx="18" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="3"/>
    <text class="eyebrow" x="34" y="48" fill="#0369a1">What it does</text>
    <text class="card-title" x="34" y="100">Checks key portal workflows</text>
    <g transform="translate(34 132)">
      <rect x="0" y="0" width="150" height="44" rx="22" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
      <text class="pill" x="75" y="29" text-anchor="middle">Applications</text>
      <rect x="164" y="0" width="108" height="44" rx="22" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
      <text class="pill" x="218" y="29" text-anchor="middle">Activity</text>
      <rect x="286" y="0" width="130" height="44" rx="22" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
      <text class="pill" x="351" y="29" text-anchor="middle">Audit Logs</text>
      <rect x="430" y="0" width="88" height="44" rx="22" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
      <text class="pill" x="474" y="29" text-anchor="middle">Users</text>
      <rect x="532" y="0" width="84" height="44" rx="22" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
      <text class="pill" x="574" y="29" text-anchor="middle">Roles</text>
    </g>
    <text class="body" x="34" y="224">Validates navigation, Add Application flows, workflow evidence, user lifecycle,</text>
    <text class="body" x="34" y="257">role create/delete, and visible export controls.</text>
  </g>

  <!-- How it works -->
  <g transform="translate(985 245)">
    <rect x="0" y="0" width="815" height="300" rx="18" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
    <text class="eyebrow" x="34" y="48" fill="#15803d">How it works</text>
    <g transform="translate(34 92)">
      <rect x="0" y="0" width="190" height="74" rx="14" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
      <text class="small" x="95" y="44" text-anchor="middle">Safe auth state</text>
      <line x1="208" y1="37" x2="271" y2="37" stroke="#15803d" stroke-width="5" marker-end="url(#arrow-green)"/>
      <rect x="291" y="0" width="210" height="74" rx="14" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
      <text class="small" x="396" y="32" text-anchor="middle">npm run</text>
      <text class="small" x="396" y="56" text-anchor="middle">test:portal</text>
      <line x1="519" y1="37" x2="582" y2="37" stroke="#15803d" stroke-width="5" marker-end="url(#arrow-green)"/>
      <rect x="602" y="0" width="145" height="74" rx="14" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
      <text class="small" x="675" y="32" text-anchor="middle">Reports</text>
      <text class="small" x="675" y="56" text-anchor="middle">+ triage</text>
    </g>
    <text class="body" x="34" y="205">The runner delegates to committed Playwright tests, preserves native artifacts,</text>
    <text class="body" x="34" y="238">and keeps exit codes trustworthy.</text>
    <text class="small" x="34" y="274" fill="#166534">Secrets stay local. reCAPTCHA is handled through recorded storage state.</text>
  </g>

  <!-- Current state -->
  <g transform="translate(120 590)">
    <rect x="0" y="0" width="815" height="300" rx="18" fill="#fef3c7" stroke="#fcd34d" stroke-width="3"/>
    <text class="eyebrow" x="34" y="48" fill="#a16207">Current state</text>
    <text class="card-title" x="34" y="100">Unified runner is working</text>
    <g transform="translate(34 126)">
      <rect x="0" y="0" width="747" height="44" rx="12" fill="#ffffff" stroke="#fde68a" stroke-width="2"/>
      <text class="micro" x="18" y="28">v1.0: Playwright baseline, auth recorder, smoke tests, Add Application matrix.</text>
      <rect x="0" y="56" width="747" height="44" rx="12" fill="#ffffff" stroke="#fde68a" stroke-width="2"/>
      <text class="micro" x="18" y="84">v1.1: Portal runner, target tags, same-run safety, Users/Roles/Activity/Audit coverage.</text>
      <rect x="0" y="112" width="747" height="52" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
      <text class="micro" x="18" y="143" fill="#9a3412">Known blockers: Audit Logs same-run activity evidence and Role edit until exposed.</text>
    </g>
  </g>

  <!-- Possible expansion -->
  <g transform="translate(985 590)">
    <rect x="0" y="0" width="815" height="300" rx="18" fill="#ede9fe" stroke="#c4b5fd" stroke-width="3"/>
    <text class="eyebrow" x="34" y="48" fill="#6d28d9">Possible expansion</text>
    <text class="card-title" x="34" y="100">v2.0 goes deeper</text>
    <g transform="translate(34 126)">
      <rect x="0" y="0" width="176" height="84" rx="12" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
      <text class="small" x="88" y="31" text-anchor="middle">Phase 10</text>
      <text class="micro" x="88" y="58" text-anchor="middle">Inventory</text>
      <rect x="190" y="0" width="176" height="84" rx="12" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
      <text class="small" x="278" y="31" text-anchor="middle">Phase 11</text>
      <text class="micro" x="278" y="58" text-anchor="middle">Deep UI</text>
      <rect x="380" y="0" width="176" height="84" rx="12" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
      <text class="small" x="468" y="31" text-anchor="middle">Phase 12</text>
      <text class="micro" x="468" y="58" text-anchor="middle">API contracts</text>
      <rect x="570" y="0" width="176" height="84" rx="12" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
      <text class="small" x="658" y="31" text-anchor="middle">Phase 13</text>
      <text class="micro" x="658" y="58" text-anchor="middle">UI/API match</text>
    </g>
    <text class="body" x="34" y="248">Expansion target: full reachable UI behavior, safe API validation, redacted</text>
    <text class="body" x="34" y="280">diagnostics, and focused/full coverage commands.</text>
  </g>

  <g transform="translate(120 925)">
    <rect x="0" y="0" width="1680" height="58" rx="16" fill="#ffffff" stroke="#dbe4ee" stroke-width="2"/>
    <text class="small" x="26" y="36">Safety rule:</text>
    <text class="body" x="140" y="36">same-run records only.</text>
    <text class="body" x="390" y="36">Name pattern:</text>
    <text class="mono" x="545" y="36">AUTOMATION &lt;area&gt; &lt;run-id&gt; &lt;record-label&gt;</text>
    <text class="small" x="1325" y="36" fill="#0f172a">Source of truth: Playwright tests.</text>
  </g>
</svg>
